kind = "web"
previewPath = "/"
title = "TowSite"
version = "1.0.0"
id = "artifacts/towsite"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22001

[services.development]
run = "pnpm --filter @workspace/towsite run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/towsite", "run", "build" ]
publicDir = "artifacts/towsite/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22001"
BASE_PATH = "/"
